name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v4

    - name: Install Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip build-essential git zip unzip \
          openjdk-11-jdk autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev cmake libffi-dev \
          libssl-dev patch
        pip install buildozer==1.4.0
        pip install cython==0.29.33

    - name: Create buildozer.spec
      run: |
        printf '[app]\ntitle = Galactic Assault\npackage.name = galacticassault\npackage.domain = com.spaceshooter\nsource.dir = .\nsource.include_exts = py,json\nversion = 1.0\nrequirements = python3,kivy==2.1.0,pygame==2.1.0\norientation = portrait\nfullscreen = 0\nandroid.permissions = INTERNET\nandroid.api = 31\nandroid.minapi = 21\nandroid.ndk = 23b\nandroid.ndk_api = 21\nandroid.archs = arm64-v8a\nandroid.accept_sdk_license = True\nandroid.allow_backup = True\n\n[buildozer]\nlog_level = 2\nwarn_on_root = 0\n' > buildozer.spec
        cat buildozer.spec

    - name: Verify main.py
      run: |
        ls -la
        head -3 main.py

    - name: Build APK
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
        buildozer android debug 2>&1
      env:
        JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: galactic-assault-debug
        path: bin/*.apk
