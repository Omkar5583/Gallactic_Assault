name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev patch
        pip install buildozer==1.5.0 cython==0.29.33

    - name: Create buildozer.spec
      run: |
        printf '[app]\ntitle = Galactic Assault\npackage.name = galacticassault\npackage.domain = com.spaceshooter\nsource.dir = .\nsource.include_exts = py,json\nversion = 1.0\nrequirements = python3,kivy,pygame==2.1.3\norientation = portrait\nfullscreen = 0\nandroid.permissions = INTERNET\nandroid.api = 33\nandroid.minapi = 21\nandroid.ndk = 25b\nandroid.ndk_api = 21\nandroid.archs = arm64-v8a\nandroid.accept_sdk_license = True\nandroid.allow_backup = True\nandroid.ndk_path = /usr/local/lib/android/sdk/ndk/27.3.13750724\nandroid.sdk_path = /usr/local/lib/android/sdk\np4a.branch = master\n\n[buildozer]\nlog_level = 2\nwarn_on_root = 0\n' > buildozer.spec
        cat buildozer.spec

    - name: Fix sqlite3 recipe
      run: |
        pip install python-for-android
        P4A_PATH=$(python -c "import pythonforandroid; import os; print(os.path.dirname(pythonforandroid.__file__))")
        echo "p4a path: $P4A_PATH"
        SQLITE_RECIPE="$P4A_PATH/recipes/sqlite3"
        cat "$SQLITE_RECIPE/__init__.py"
        curl -L "https://www.sqlite.org/2023/sqlite-amalgamation-3430200.zip" -o sqlite.zip
        unzip sqlite.zip
        cp sqlite-amalgamation-3430200/sqlite3.c "$SQLITE_RECIPE/sqlite3.c"
        cp sqlite-amalgamation-3430200/sqlite3.h "$SQLITE_RECIPE/sqlite3.h"
        ls "$SQLITE_RECIPE"

    - name: Verify main.py
      run: |
        ls -la
        head -3 main.py

    - name: Build APK
      run: buildozer android debug 2>&1
      env:
        JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: galactic-assault-debug
        path: bin/*.apk
